apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../../../config/default

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
- files:
  - controller_manager_config.yaml=controller_manager_config_scheduling.yaml
  name: manager-config
  behavior: replace
  namespace: jobset-system

patches:
- path: manager_scheduling_patch.yaml
  target:
    group: apps
    version: v1
    kind: Deployment
    name: controller-manager
    namespace: system

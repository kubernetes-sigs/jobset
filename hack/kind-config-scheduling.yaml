kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
featureGates:
  GenericWorkload: true
  # WorkloadWithJob is intentionally disabled. When enabled, the upstream Job
  # controller creates its own Workload/PodGroup per Job. JobSet manages
  # scheduling objects at the JobSet level, so per-Job objects are redundant
  # and interfere with e2e assertions that count scheduling resources.
  WorkloadWithJob: false
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: ClusterConfiguration
        apiVersion: kubeadm.k8s.io/v1beta4
        scheduler:
          extraArgs:
          - name: v
            value: "3"
        controllerManager:
          extraArgs:
          - name: v
            value: "3"
        apiServer:
          extraArgs:
          - name: enable-aggregator-routing
            value: "true"
          - name: runtime-config
            value: "scheduling.k8s.io/v1alpha3=true"
          - name: v
            value: "3"
      - |
        kind: InitConfiguration
        apiVersion: kubeadm.k8s.io/v1beta4
        nodeRegistration:
          kubeletExtraArgs:
          - name: v
            value: "3"
  - role: worker
    labels:
      instance-type: on-demand
  - role: worker
    labels:
      instance-type: spot

kubeadmConfigPatches:
  - |
    kind: JoinConfiguration
    apiVersion: kubeadm.k8s.io/v1beta4
    nodeRegistration:
      kubeletExtraArgs:
      - name: v
        value: "3"
